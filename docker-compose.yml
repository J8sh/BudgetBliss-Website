services:
  budgetbliss:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: budgetbliss
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - ./uploads:/app/uploads
    env_file:
      - .env.local
    networks:
      - mongodb_mongo-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  mongodb_mongo-net:
    external: true
